<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="Content-type" content="text/html; charset=UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<script>{JS}</script>
		<style>{CSS}</style>
		<title></title>

	</head>
	<body>
		<div>
			<div class="all_outside" ontouchstart="">
			
			
			
				<!-- 四位密碼輸入 -->
				<div class="oth_prepass_box">
					<div class="oth_pass_hello">*ART_prepass_hello*<span id="user_name" class="oth_pass_hello" ></span></div>
					<h1 class="oth_pass_title">*ART_prepass_enter*</h1>
					<div id="oth_pass_err" class="oth_pass_err" style="display:none;">*ART_prepass_err*</div>
			
			
			
					<!-- 輸入圈圈 -->
					<!-- 輸入時在li加入class .active -->
					<ul id="empty_bar" class="oth_pass_circle mb7">
						<li id="empty_1" class="empty"></li>
						<li id="empty_2" class="empty"></li>
						<li id="empty_3" class="empty"></li>
						<li id="empty_4" class="empty"></li>
					</ul>
					<!-- 輸入圈圈 end -->
			
			
			
					<!-- 數字鍵盤 -->
					<div id="panel" class="oth_pass_keyboard">
						<span id="num_1">1</span>
						<span id="num_2">2</span>
						<span id="num_3">3</span>
						<span id="num_4">4</span>
						<span id="num_5">5</span>
						<span id="num_6">6</span>
						<span id="num_7">7</span>
						<span id="num_8">8</span>
						<span id="num_9">9</span>
						<span id="num_0">0</span>
					</div>
					<!-- 數字鍵盤 end -->
			
			
			
			
			
					<!-- 功能鍵 -->
					<div class="oth_function">
						<button id="back_login" type="button" class="btn_oth_fun">*ART_prepass_login*</button>
						<button id="delpasscode" type="button" class="btn_oth_fun">*ART_prepass_delete*</button>
					</div>
					<!-- 功能鍵 end -->
				</div>
				<!-- 四位密碼輸入 end -->
			
			
			
			</div>
		</div>
	</body>
</html>
