<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name='viewport' content='maximum-scale=1, width=device-width, user-scalable=no, minimum-scale=1.0, viewport-fit=cover'/>
	<title>右面板</title>
	<script id="homeJS">{JS}</script>
	
	<link href="{CDNURL}/style/score_board.css" rel="stylesheet" type="text/css">
</head>
<body>
	<div class="content_r">
		<!-- BS Score board in-play-->
		<div id="R_div_matches" class="box_scoboard bs" style="display: none;">
			<div id="R_box_scostate" class="box_scostate">
				<tt class="text_time_go"><p id="R_game_count">0</p><i id="R_game_half" class="icon_bs_down"></i></tt>
				<i id="R_midfield" class="icon_n" style="display: none;"></i>
			</div>
			<div id="R_box_sco_bs" class="box_sco_bs sco_bs_th">
				<span class="sco_bs sco_bs_point">1</span>
				<span class="sco_bs sco_bs_point">2</span>
				<span class="sco_bs sco_bs_point">3</span>
				<span class="sco_bs sco_bs_point">4</span>
				<span class="sco_bs sco_bs_point">5</span>
				<span class="sco_bs sco_bs_point">6</span>
				<span class="sco_bs sco_bs_point">7</span>
				<span class="sco_bs sco_bs_point">8</span>
				<span class="sco_bs sco_bs_point">9</span>
				<span class="sco_bs sco_bs_set">*ART_scrbs_ot*</span>
			</div>
			<div id="R_box_sco_l" class="box_sco_l">
				<div class="box_scoteam team_h">
					<span id="R_serve_h" class="icon_serve"></span><!-- 發球方 Add class="on" -->
					<span id="R_sc_game_H" class="text_point"></span>
					<span id="R_team_h" class="text_team"></span>

					<div class="box_sco_bs">
						<span id="R_sc_1st_H" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_2nd_H" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_3th_H" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_4th_H" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_5th_H" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_6th_H" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_7th_H" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_8th_H" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_9th_H" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_ov_H" class="sco_bs sco_bs_set"></span>
					</div>
				</div>

				<div class="box_scoteam team_c">
					<span id="R_serve_c" class="icon_serve"></span><!-- 發球方 Add class="on" -->
					<span id="R_sc_game_A" class="text_point"></span>
					<span id="R_team_c" class="text_team"></span>
					<div class="box_sco_bs">
						<span id="R_sc_1st_A" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_2nd_A" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_3th_A" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_4th_A" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_5th_A" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_6th_A" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_7th_A" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_8th_A" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_9th_A" class="sco_bs sco_bs_point"></span>
						<span id="R_sc_ov_A" class="sco_bs sco_bs_set"></span>
					</div>
				</div>

			</div>
			<div id="R_box_sco_point" class="box_sco_point">
				<div id="R_base_icon" class="icon_bs_base bs_NNN"></div>
				<!-- bs_NNN / bs_YNN / bs_NYN / bs_NNY / bs_YYN / bs_YNY / bs_NYY / bs_YYY -->
				<div class="point_bs_s">*ART_scrbs_out*<tt id="R_out_count">0</tt></div>
			</div>
		</div>

		<!-- scored borad / today / early / parlay -->
		<div id="div_matches" class="box_scoboard_r bs" style="display: none;">
			<div class="box_scostate">
				<tt id="game_time" class="text_time"></tt>
				<i id="midfield" class="icon_n" style="display:none"></i>
			</div>
			<div class="box_sco_l">
				<div class="box_scoteam team_h">
					<span id="team_h" class="text_team"></span>
				</div>
				<div class="box_sco_vs">V</div>
				<div class="box_scoteam team_c">
					<span id="team_c" class="text_team"></span>
				</div>
			</div>
		</div>

	</div>

</body>
</html>
