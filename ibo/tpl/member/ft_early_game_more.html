<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name='viewport' content='maximum-scale=1, width=device-width, user-scalable=no, minimum-scale=1.0, viewport-fit=cover'/>
	<title>FT 早餐內層盤面</title>
	<script id="homeJS">{JS}</script>
	
	<link href="{CDNURL}/style/bet_game.css" rel="stylesheet" type="text/css">
	<link href="{CDNURL}/style/score_board.css" rel="stylesheet" type="text/css">
	<link href="{CDNURL}/style/tvmt.css" rel="stylesheet" type="text/css">
	<link href="{CDNURL}/style/aspen_LMT2.css" rel="stylesheet" type="text/css">
	<link href="{CDNURL}/style/aspen_stylesheet.css" rel="stylesheet" type="text/css">
</head>
<body>
	<div class="content_l">

		<!-- game title -->
		<div class="head_league ft">
			<div class="head_inngame">
				<div class="title_inn">
					<div id="btn_back" class="btn_back"><i><svg><use xlink:href="#icon_back"/></svg></i></div>
					<div class="title_le_sport">
						<span id="league"></span>
					</div>
					<i id="forecast_btn" class="icon_forecast" style="display: ;"><svg><use xlink:href="#icon_forecast"/></svg></i>
					<div id="more_icon_info" class="btn_info" style="display: none"><i class="icon_information"><svg><use xlink:href="#icon_i"></use></svg></i></div>
				</div>
			</div>
		</div>


		<!-- FT Score board -->
		<div id="div_matches" class="box_scoboard_r ft" style="display: ;">
			<div class="box_scostate">
				<tt id="game_time" class="text_time"></tt>
				<i id="midfield" class="icon_n" style="display:none"></i>
				<span id="clothes_h_600" class="icon_shirt" style="display:none"><svg><use xlink:href="#icon_shirt" /></svg></span>
				<span id="clothes_c_600" class="icon_shirt" style="display:none"><svg><use xlink:href="#icon_shirt" /></svg></span>
			</div>
			<div class="box_sco_l">
				<div class="box_scoteam team_h">
					<span id="clothes_h" class="icon_shirt" style="display:none"><svg><use xlink:href="#icon_shirt" /></svg></span>
					<span id="team_h" class="text_team"></span>
				</div>
				<div class="box_sco_vs">V</div>
				<div class="box_scoteam team_c">
					<span id="clothes_c" class="icon_shirt" style="display:none"><svg><use xlink:href="#icon_shirt" /></svg></span>
					<span id="team_c" class="text_team"></span>
				</div>
			</div>
		</div>

		<!-- TV / MT hide in PC size -->
		<div id="watch_live" class="box_tvmt" style="display: none;">
			<div id="timeline_btn" class="timeline_btn_off" style="display: none;"></div><!--show Change class="timeline_btn_on"-->

			<div id="live_div" class="content_live">
				<div id="tv_box" class="box_tv">
					<div id="tv_loading" class="loading inn_loading" style="display: none;"><i class="icon_load"></i></div>
					<div id="tv_show" class="show_tv">
						<div id="player">
							<video id="html5_player" width="100%" height="100%" autoplay playsinline webkit-playsinline>
							</video>
						</div>
					</div>
					<div id="tv_error" class="error_tv" style="display: none;">
						<i class="img_tv"></i>
						<tt id="tv_error_msg"></tt>
						<tt id="tv_error_data"></tt>
					</div>
					<div id="def_pic" class="bg_tv">
						<div id="tv_start" class="btn_tvplay" style="display: none1;"></div>
					</div>
				</div>

				<div id="mt_box" class="box_mt" style="display: none;">
					<div id="mt_loading" class="loading inn_loading" style="display: none;"><i class="icon_load"></i></div>
					<div id="mt_show" class="show_mt">
						<iframe id="mt_main" class="mt_main" scrolling="no"></iframe>
					</div>
					<div id="mt_error" class="error_tv" style="display: none;"></div>
				</div>
				<!-- AT -->
				<div id="at_box" class="box_at" style="display: none;">
					<div id="at_loading" class="loading inn_loading" style="display: none;"><i class="icon_load"></i></div>
					<div id="at_show" class="show_at">
						<iframe id="at_main" class="at_main" scrolling="no"></iframe>
					</div>
					<div id="at_error" class="error_tv" style="display: none;"></div>
				</div>
			</div>

			<div id="mt_btn_div" class="menu_mt" >
				<div id="div_showtype" class="box_scroll mt_scroll">
					<div id="mt_left" class="btn_go_l"><svg><use xlink:href="#icon_rightarr"/></svg></div>
					<div id="mt_right" class="btn_go_r"><svg><use xlink:href="#icon_rightarr"/></svg></div>
					<div id="mt_scroll" class="box_slide">
						<label id="mt_total">
							<span id="tv_btn" class="video_btn">
								<i class="icon_tv"><svg><use xlink:href="#icon_channel"></use></svg></i>
							</span>
							<span id="at_btn" class="video_btn disabled">
								<i><svg><use xlink:href="#icon_mic"></use></svg></i>
							</span>
							<span id="mt_btn" class="btn_mt">
								<i id="mt_icon" class="icon_match_FT"><!-- 依據球類更換代碼 -->
									<svg class="mt_FT"><use xlink:href="#icon_mt_ft"></use></svg>
									<svg class="mt_none"><use xlink:href="#icon_mt_none"></use></svg>
								</i>
							</span>

							<span id="statistic_btn" class="btn_mt"><i class="icon_statistics"><svg><use xlink:href="#icon_statistics"></use></svg></i></span>
							<span id="comment_btn" class="btn_mt"><i class="icon_commentary"><svg><use xlink:href="#icon_commentary"></use></svg></i></span>
							<span id="team_btn" class="btn_mt"><i class="icon_team"><svg><use xlink:href="#icon_team"></use></svg></i></span>
							<span id="htoh_btn" class="btn_mt"><i class="icon_headhead"><svg><use xlink:href="#icon_headhead"></use></svg></i></span>
							<span id="livetable_btn" class="btn_mt"><i class="icon_league"><svg><use xlink:href="#icon_league"></use></svg></i></span>
							<span id="pointBypoint_btn" class="btn_mt"><i class="icon_pbyp"><svg><use xlink:href="#icon_pbyp"></use></svg></i></span>
							<span id="probabilities_btn" class="btn_mt"><i class="icon_probabilities"><svg><use xlink:href="#icon_probabilities"></use></svg></i></span>
							<span id="boxscore_btn" class="btn_mt"><i class="icon_boxscore"><svg><use xlink:href="#icon_boxscore"></use></svg></i></span>
						</label>
						<xmp id="li_layer" style="display:none" >
							<li id="*ID*">*SHOW*</li>
						</xmp>
					</div>
				</div>

				<div id="collapse_btn" class="btn_switch on"><!-- tv/mt展開時 Add class="on" -->
					<i class="icon_toparr"><svg><use xlink:href="#icon_toparr"></use></svg></i>
				</div>
				<ul id="tv_list" class="video_box" style="display: none">
					<!-- li_layer -->
				</ul>
				<ul id="at_list" class="video_box" style="display: none">
					<!-- li_layer -->
				</ul>
				<ul id="mt_list" class="video_box" style="display: none">
					<!-- li_layer -->
				</ul>
			</div>

			<div id="mt_pop" class="popup_mt"><!-- show Add class="on"-->
				<div id="mt_pop_mask" class="mask_popup"></div>
				<div id="box_popup" class="box_popup"><!-- full height Add class="on" -->
					<div id="title_popup" class="title_popup">
						<div class="btn_fullscr"><i><svg><use xlink:href="#icon_toparr"/></svg></i></div>
						<span id="mt_pop_title"><!-- MT TITLE --></span>
						<div id="mt_sub_close" class="btn_close" type="mt_close"><i type="mt_close"><svg type="mt_close"><use type="mt_close" xlink:href="#icon_close"/></svg></i></div>
					</div>
					<div id="mt_pop_loading" class="loading inn_loading" style="display: none;">
						<i class="icon_load"></i>
					</div>
					<div class="content_popup">
						<iframe id="mt_sub" scrolling="no"><!--BET RADAR--></iframe>
					</div>
				</div>
			</div>
		</div>

		<!-- Filters -->
		<div id="div_filter" class="box_scroll inn_filter">
			<div id="filter_left" class="btn_go_l"><svg><use xlink:href="#icon_rightarr"/></svg></div>
			<div id="filter_right" class="btn_go_r"><svg><use xlink:href="#icon_rightarr"/></svg></div>
			<div id="filter_scroll" class="box_slide dragscroll_filter_inner">
				<label id="filter_total">
					<div id="Main_filter" class="btn_filter on">*ART_ft_filter_popular*</div>
					<div id="RmixOU_filter" class="btn_filter">*ART_ft_filter_hou*</div>
					<div id="Goals_filter" class="btn_filter">*ART_ft_filter_goals*</div>
					<div id="Halves_filter" class="btn_filter">*ART_ft_filter_halves*</div>
					<div id="Intervals_filter" class="btn_filter">*ART_ft_filter_intervals*</div>
					<div id="Corners_filter" class="btn_filter">*ART_ft_filter_corners*</div>
					<div id="Bookings_filter" class="btn_filter">*ART_ft_filter_booking*</div>
					<div id="Others_filter" class="btn_filter">*ART_ft_filter_others*</div>
					<div id="All_filter" class="btn_filter">*ART_ft_filter_all*</div>
				</label>
			</div>
		</div>

		<!-- Filters loading -->
		<div id="filter_loading" class="loading filter_loading" style="display: none;"><i class="icon_load"></i></div> <!-- class="loading_on"-->

		<!-- no data -->
		<div id="div_nodata" name="div_nodata" class="no_event" style="display: none;"><i></i><span>*ART_game_nodata*</span></div>


		<div id="div_show" class="box_inn ft_inn"></div>


		<div id="div_model" class="box_inn ft_inn" style="display:none">
			<!-- SB model -->
			<label>
				<div id="header_sbet" class="game_title_inn">
					<tt>
						<div class="game_title_type"><span>*PTYPE**ART_game_sb2*</span></div>
					</tt>
					<i id="msgShow" class="icon_information" style="display:*MSGSHOW*;"><svg><use xlink:href="#icon_i"></use></svg></i>
				</div>
				<div id="body_sbet" class="box_innbet box_innbet_s1m2"></div>
				<div id="model_sbet" class="box_innbet box_innbet_s1m2" style="display: none;">
					<div id="bet_*GID*_*ECID*_SPD" class="box_odd_sb" style="*CLOSE_SPD*">
						<span><tt>*TEAM_SPD*</tt>*ART_game_spd**SPD_SCORE*</span>
						<div id="bet_*GID*_*ECID*_*SPD_RTYPE*" class="btn_obt_odd">
							<span class="text_odds_old">*IOR_PD*</span>
							<span class="text_odds">*IOR_SPD*</span>
						</div>
					</div>
					<div id="bet_*GID*_*ECID*_SWN" class="box_odd_sb" style="*CLOSE_SWN*">
						<span><tt>*TEAM_SWN*</tt>*SWN_SCORE**ART_game_swn*</span>
						<div id="bet_*GID*_*ECID*_*SWN_RTYPE*" class="btn_obt_odd">
							<span class="text_odds_old">*IOR_WN*</span>
							<span class="text_odds">*IOR_SWN*</span>
						</div>
					</div>
					<div id="bet_*GID*_*ECID*_SWM" class="box_odd_sb" style="*CLOSE_SWM*">
						<span><tt>*TEAM_SWM*</tt>*SWM_SCORE*</span>
						<div id="bet_*GID*_*ECID*_*SWM_RTYPE*" class="btn_obt_odd">
							<span class="text_odds_old">*IOR_WM*</span>
							<span class="text_odds">*IOR_SWM*</span>
						</div>
					</div>
				</div>
			</label>
			<!-- R model -->
			<label>
				<div id="header_r" class="game_title_inn">
					<tt>
						<div class="game_title_type"><span>*PTYPE**ART_game_r*</span></div>
					</tt>
					<i id="msgShow" class="icon_information" style="display:*MSGSHOW*;"><svg><use xlink:href="#icon_i"></use></svg></i>
				</div>
				<div id="body_r" class="box_innbet box_innbet_s2m2"></div>
				<div id="model_r" class="box_innbet box_innbet_s2m2" style="display: none;">
					<div id="bet_*GID*_*ECID*_RH" class="btn_lebet_odd *CLOSE_RH*">
						<span>
							<tt class="text_ballou">*TEAM_H*</tt>
							<tt class="text_ballhead">*RATIO_RH*</tt>
						</span>
						<span class="text_odds">*IORATIO_RH*</span>
					</div>

					<div id="bet_*GID*_*ECID*_RC" class="btn_lebet_odd *CLOSE_RC*">
						<span>
							<tt class="text_ballou">*TEAM_C*</tt>
							<tt class="text_ballhead">*RATIO_RC*</tt>
						</span>
						<span class="text_odds">*IORATIO_RC*</span>
					</div>
				</div>
			</label>

			<!-- HR model -->
			<label>
				<div id="header_hr" class="game_title_inn">
					<tt>
						<div class="game_title_type"><span>*PTYPE**ART_game_r*</span></div>
						<i>*ART_game_half1*</i>
					</tt>
					<i id="msgShow" class="icon_information" style="display:*MSGSHOW*;"><svg><use xlink:href="#icon_i"></use></svg></i>
				</div>
				<div id="body_hr" class="box_innbet box_innbet_s2m2"></div>
				<div id="model_hr" class="box_innbet box_innbet_s2m2" style="display: none;">
					<div id="bet_*GID*_*ECID*_HRH" class="btn_lebet_odd *CLOSE_HRH*">
						<span>
							<tt class="text_ballou">*TEAM_H*</tt>
							<tt class="text_ballhead">*RATIO_HRH*</tt>
						</span>
						<span class="text_odds">*IORATIO_HRH*</span>
					</div>

					<div id="bet_*GID*_*ECID*_HRC" class="btn_lebet_odd *CLOSE_HRC*">
						<span>
							<tt class="text_ballou">*TEAM_C*</tt>
							<tt class="text_ballhead">*RATIO_HRC*</tt>
						</span>
						<span class="text_odds">*IORATIO_HRC*</span>
					</div>
				</div>
			</label>

			<!-- OU model -->
			<label>
				<div id="header_ou" class="game_title_inn">
					<tt>
						<div class="game_title_type"><span>*PTYPE**ART_game_ou*</span></div>
					</tt>
					<i id="msgShow" class="icon_information" style="display:*MSGSHOW*;"><svg><use xlink:href="#icon_i"></use></svg></i>
				</div>
				<div id="body_ou" class="box_innbet box_innbet_s2m2"></div>
				<div id="model_ou" class="box_innbet box_innbet_s2m2" style="display: none;">
					<div id="bet_*GID*_*ECID*_OUC" class="btn_lebet_odd *CLOSE_OUC*">
						<span>
							<tt class="text_ballou">*ART_game_over*</tt>
							<tt class="text_ballhead">*RATIO_OUC*</tt>
						</span>
						<span class="text_odds">*IORATIO_OUC*</span>
					</div>

					<div id="bet_*GID*_*ECID*_OUH" class="btn_lebet_odd *CLOSE_OUH*">
						<span>
							<tt class="text_ballou">*ART_game_under*</tt>
							<tt class="text_ballhead">*RATIO_OUH*</tt>
						</span>
						<span class="text_odds">*IORATIO_OUH*</span>
					</div>
				</div>
			</label>

			<!-- HOU model -->
			<label>
				<div id="header_hou" class="game_title_inn">
					<tt>
						<div class="game_title_type"><span>*PTYPE**ART_game_ou*</span></div>
						<i>*ART_game_half1*</i>
					</tt>
					<i id="msgShow" class="icon_information" style="display:*MSGSHOW*;"><svg><use xlink:href="#icon_i"></use></svg></i>
				</div>
				<div id="body_hou" class="box_innbet box_innbet_s2m2"></div>
				<div id="model_hou" class="box_innbet box_innbet_s2m2" style="display: none;">
					<div id="bet_*GID*_*ECID*_HOUC" class="btn_lebet_odd *CLOSE_HOUC*">
						<span>
							<tt class="text_ballou">*ART_game_over*</tt>
							<tt class="text_ballhead">*RATIO_HOUC*</tt>
						</span>
						<span class="text_odds">*IORATIO_HOUC*</span>
					</div>

					<div id="bet_*GID*_*ECID*_HOUH" class="btn_lebet_odd *CLOSE_HOUH*">
						<span>
							<tt class="text_ballou">*ART_game_under*</tt>
							<tt class="text_ballhead">*RATIO_HOUH*</tt>
						</span>
						<span class="text_odds">*IORATIO_HOUH*</span>
					</div>
				</div>
			</label>

			<!-- M model -->
			<label>
				<div id="header_m" class="game_title_inn">
					<tt>
						<div class="game_title_type"><span>*PTYPE**ART_game_m*</span></div>
					</tt>
					<i id="msgShow" class="icon_information" style="display:*MSGSHOW*;"><svg><use xlink:href="#icon_i"></use></svg></i>
				</div>
				<div id="body_m" class="box_innbet box_innbet_s3m3"></div>
				<div id="model_m" class="box_innbet box_innbet_s3m3" style="display: none;">
					<div id="bet_*GID*_*ECID*_MH" class="btn_lebet_odd *CLOSE_MH*">
						<span>
							<tt class="text_ballou">*TEAM_H*</tt>
						</span>
						<span class="text_odds">*IORATIO_MH*</span>
					</div>

					<div id="bet_*GID*_*ECID*_MN" class="btn_lebet_odd *CLOSE_MN*">
						<span>
							<tt class="text_ballou">*ART_game_draw*</tt>
						</span>
						<span class="text_odds">*IORATIO_MN*</span>
					</div>

					<div id="bet_*GID*_*ECID*_MC" class="btn_lebet_odd *CLOSE_MC*">
						<span>
							<tt class="text_ballou">*TEAM_C*</tt>
						</span>
						<span class="text_odds">*IORATIO_MC*</span>
					</div>
				</div>
			</label>

			<!-- HM model -->
			<label>
				<div id="header_hm" class="game_title_inn">
					<tt>
						<div class="game_title_type"><span>*PTYPE**ART_game_m*</span></div>
						<i>*ART_game_half1*</i>
					</tt>
					<i id="msgShow" class="icon_information" style="display:*MSGSHOW*;"><svg><use xlink:href="#icon_i"></use></svg></i>
				</div>
				<div id="body_hm" class="box_innbet box_innbet_s3m3"></div>
				<div id="model_hm" class="box_innbet box_innbet_s3m3" style="display: none;">
					<div id="bet_*GID*_*ECID*_HMH" class="btn_lebet_odd *CLOSE_HMH*">
						<span>
							<tt class="text_ballou">*TEAM_H*</tt>
						</span>
						<span class="text_odds">*IORATIO_HMH*</span>
					</div>

					<div id="bet_*GID*_*ECID*_HMN" class="btn_lebet_odd *CLOSE_HMN*">
						<span>
							<tt class="text_ballou">*ART_game_draw*</tt>
						</span>
						<span class="text_odds">*IORATIO_HMN*</span>
					</div>

					<div id="bet_*GID*_*ECID*_HMC" class="btn_lebet_odd *CLOSE_HMC*">
						<span>
							<tt class="text_ballou">*TEAM_C*</tt>
						</span>
						<span class="text_odds">*IORATIO_HMC*</span>
					</div>
				</div>
			</label>


			<!-- PD model -->
			<label>
				<div id="header_pd" class="game_title_inn">
					<tt>
						<div class="game_title_type"><span>*ART_game_pd*</span></div>
					</tt>
				</div>

				<div id="body_pd" class="box_innbet box_innbet_rpd"></div>

				<div id="model_PD_menu">
					<!-- 波膽顯示模式 -->
					<div id="tab_PDswitch" class="tab_PDswitch">
						<div id="tab_pd_all" class="btn_PDswitch on">*ART_pdview_list*</div>
						<div id="tab_pd_choice" class="btn_PDswitch new">*ART_pdview_score*</div>
					</div>

					<!-- 全/半場切換 -->
					<div class="box_btn_pd">
						<button id="icon_FT_*ECID*" type="button" class="*SHOW_FT*" style="display: *FULL_SW*;">*ART_game_fulltime*</button>
						<button id="icon_HT_*ECID*" type="button" class="*SHOW_HT*" style="display: *HALF_SW*;">*ART_game_half1*</button>
					</div>

					<!-- loading for pd -->
					<div id="pd_loading" class="loading *pd_loading_css*" style="display: none;"><i class="icon_load"></i></div><!-- class="pd_loading_on" -->
				</div>

				<!-- 全場-主隊強 3:1:1 -->
				<div id="model_PD_HOST" style="display:none;">
					<div id="div_PD_*GID*_*ECID*" name="model_HOST" class="box_rpdbet strong_team_H *SHOWMORE* *ALLZERO*" style="display:*FT_SHOW*;" data-noEventOBT="*ART_data_pd_nodata*">
						<!-- 左邊的欄位 -->
						<label class="innbet_rpd_l">
							<div class="head_lebet"><span>*TEAM_H*</span></div>

							<div id="bet_*GID*_*ECID*_*HPD0*" class="btn_lebet_odd *CLOSE_*HPD0** *H0_SHOW*">
								<span>
									<tt class="text_ballou">*HPD0_SCORE*</tt>
								</span>
								<span class="text_odds">*IORATIO_*HPD0**</span>
							</div>
							<div id="bet_*GID*_*ECID*_*HPD1*" class="btn_lebet_odd *CLOSE_*HPD1** *H1_SHOW*">
								<span>
									<tt class="text_ballou">*HPD1_SCORE*</tt>
								</span>
								<span class="text_odds">*IORATIO_*HPD1**</span>
							</div>
							<div id="bet_*GID*_*ECID*_*HPD2*" class="btn_lebet_odd *CLOSE_*HPD2** *H2_SHOW*">
								<span>
									<tt class="text_ballou">*HPD2_SCORE*</tt>
								</span>
