<script>
function retry(obj){
	 	var _url = obj.src;
		var tmp = document.createElement("script");
		tmp.id = obj.id;
		tmp.src = _url;
		tmp.onerror = function(){retry(tmp)};
		setTimeout(addScript, 1000, tmp);
}

function addScript(obj){
		try{
	  		var rmObj = document.getElementById(obj.id);
            rmObj.parentNode.removeChild(rmObj);
		}catch(e){}
			
		(document.getElementsByTagName("head")[0] || document.body).appendChild(obj);	
}	
</script>
