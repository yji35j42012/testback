<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name='viewport' content='maximum-scale=1, width=device-width, user-scalable=no, minimum-scale=1.0, viewport-fit=cover'/>
	<title>Modal</title>
	<script id="homeJS">{JS}</script>
	<link href="{CDNURL}/style/popup.css" rel="stylesheet" type="text/css">
</head>
<body>
<!-- 	<div>
		<div id="" class="mask_popup"></div> -->
		<div id="" class="modal_popup">
			<!-- <div class="popup_title">
				<span id="modal_title">SETTINGS</span>
				<div id="btn_close" class="btn_close"><i class="icon_close"><svg><use xlink:href="#icon_close"/></svg></i></div>
			</div> -->
			<div class="popup_league_sort">
				<div id="league_sort">
					<span>*ART_leaSet_sort*</span>
					<div class="modal_radio modal_sort">				
						<div>
							<input type="radio" id="sort_competition" name="sort" value="sort_competition" checked/>
							<label for="sort_competition"><i><svg><use xlink:href="#icon_sort_cup"/></svg></i>*ART_leaSet_sort_c*</label>
						</div>
						<div>
							<input type="radio" id="sort_time" name="sort" value="sort_time"/>
							<label for="sort_time"><i><svg><use xlink:href="#icon_sort_time"/></svg></i>*ART_leaSet_sort_t*</label>
						</div>
					</div>
				</div>
				<div id="league_filter">
					<span>*ART_leaSet_filters*</span>
					<div id="league_filter_btn" class="modal_btn"><i><svg><use xlink:href="#icon_filter"/></svg></i>*ART_leaSet_filters_1*</div>
				</div>
				<div id="ratioUpdateSw">
					<span>*ART_leaSet_oddsup*</span>
					<p>*ART_leaSet_oddsup_1*</p>
					<div class="modal_radio modal_filters">				
						<div>
							<input type="radio" id="ratio_update_on" name="filters" value="ratio_update_on" checked/>
							<label for="ratio_update_on"><i><svg><use xlink:href="#icon_checkbox"/></svg></i>*ART_leaSet_enabled*</label>
						</div>
						<div>
							<input type="radio" id="ratio_update_off" name="filters" value="ratio_update_off"/>
							<label for="ratio_update_off"><i><svg><use xlink:href="#icon_checkbox"/></svg></i>*ART_leaSet_disabled*</label>
						</div>
					</div>
				</div>
			</div>
		</div>
<!-- 	</div> -->
</body>
</html>
